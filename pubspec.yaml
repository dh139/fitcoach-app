name: fitcoach
description: AI Fitness Coach — Flutter app
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0
  

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  # Add to dependencies:
  speech_to_text: 7.3.0
  http: ^1.2.1        # for SSE streaming (Dio doesn't handle chunked streams well)

  # Local storage
  flutter_secure_storage: 10.0.0
  hive_flutter: ^1.1.0

  # UI / media
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  image_picker: ^1.0.7

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  url_launcher: ^6.2.5
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2

  # Fonts
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.2
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  